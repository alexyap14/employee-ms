
services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: employee-ms-db
    restart: always
    environment:
      MYSQL_DATABASE: employeems
      MYSQL_ROOT_PASSWORD: rootpassword   # Use a strong password in real projects
    ports:
      - "3307:3306" # Map host port 3307 to container port 3306 (avoids conflicts)
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot Application Service
  web:
    build: .
    container_name: employee-ms-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Override application.properties to connect to the 'db' service
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/employeems?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy # Wait for MySQL to be healthy before starting

volumes:
  db_data: